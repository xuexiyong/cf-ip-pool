name: Update CF IP Pool

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ✅ 获取并清洗 IP
      - name: Fetch and Clean IPs
        run: |
          curl -s https://raw.githubusercontent.com/vfarid/cf-clean-ips/main/list.txt \
          | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' \
          | sort -u \
          | shuf -n 100 > ip.txt

      # ✅ 转 JSON
      - name: Convert to JSON
        run: |
          echo "[" > ip.json
          awk '{printf "\"%s\",\n", $0}' ip.txt | sed '$ s/,$//' >> ip.json
          echo "]" >> ip.json

      # ✅ 提交
      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add ip.json
          git commit -m "update ip pool" || echo "no changes"
          git push
